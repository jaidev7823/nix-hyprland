###################
### KEYBINDINGS ###
###################

$mainMod = SUPER 

# Tui
# --- Window Rules ---
# This tells Hyprland: "If a window has the title 'tui-menu', make it float"


# Applications
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, RETURN, exec, [float; size 800 550] $terminal 
bind = $mainMod, Q, killactive,
bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, togglefloating,
bind = $mainMod, Space, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, B, exec, xdg-open "https://",
bind = $mainMod+SHIFT, B, exec, chromium
# Scripts - Updated with Bash + Absolute Paths bind = $mainMod, R, exec, bash /home/jaidev/.config/hypr/scripts/wbrestart.sh
bind = $mainMod, L, exec, bash .config/hypr/scripts/hyprlock.sh
bind = $mainMod, W, exec, bash .config/hypr/scripts/wppicker.sh
bind = $mainMod SHIFT, S, exec, bash .config/hypr/scripts/screenshot.sh
bind = $mainMod SHIFT, Q, exec, bash .config/hypr/scripts/KillActiveProcess.sh
bind = $mainMod ALT, W, exec, bash .config/hypr/scripts/WaybarStyles.sh
bind = $mainMod ALT SHIFT, W, exec, bash .config/hypr/scripts/WaybarLayout.sh
# Power Menu (wlogout)
bind = $mainMod, Escape, exec, bash /home/jaidev/.config/hypr/scripts/Wlogout.sh
bind = $mainMod, V, exec, bash /home/jaidev/.config/hypr/scripts/clipboard.sh 

# Omarchy Standard TUI Hotkeys
bind = $mainMod CTRL, D, exec, [float; size 800 550] $terminal --title tui-menu -e lazydocker
bind = $mainMod CTRL, T, exec, [float; size 800 550] $terminal --title tui-menu -e btop
bind = $mainMod CTRL, W, exec, [float; size 800 550] $terminal --title tui-menu -e impala
bind = $mainMod CTRL, B, exec, [float; size 800 550] $terminal --title tui-menu -e bluetui
bind = $mainMod CTRL, A, exec, [float; size 800 550] $terminal --title tui-menu -e pulsemixer

# Utilities
bind = $mainMod, C, exec, hyprpicker -a
bind = $mainMod, H, exec, pkill -SIGUSR1 waybar
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod SHIFT, E, exec, kitty yazi

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move Windows
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# Resize windows
binde = $mainMod SHIFT, left, resizeactive,-50 0
binde = $mainMod SHIFT, right, resizeactive,50 0
binde = $mainMod SHIFT, up, resizeactive,0 -50
binde = $mainMod SHIFT, down, resizeactive,0 50

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8

# Mouse Binds
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia & Brightness (Updated with Bash)
bindel = ,XF86AudioRaiseVolume, exec, bash /home/jaidev/.config/hypr/scripts/volume.sh --inc
bindel = ,XF86AudioLowerVolume, exec, bash /home/jaidev/.config/hypr/scripts/volume.sh --dec
bindel = ,XF86AudioMute, exec, bash /home/jaidev/.config/hypr/scripts/volume.sh --toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, bash /home/jaidev/.config/hypr/scripts/brightness.sh --inc
bindel = ,XF86MonBrightnessDown, exec, bash /home/jaidev/.config/hypr/scripts/brightness.sh --dec

# Media Controls
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
