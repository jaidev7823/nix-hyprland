general {
    gaps_in = 3
    gaps_out = 6

    border_size = 2

    col.active_border = $outline
    col.inactive_border = $outline_variant

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 0.9
    inactive_opacity = 0.8
    fullscreen_opacity = 1.0
    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 3
 	ignore_opacity = true
    	new_optimizations = true
    	special = false
    	popups = true
    	xray = true
	
        vibrancy = 0.1696
    }
}
group {
    # Active border: A medium-light gray to show focus
    col.border_active = rgba(949494ff) 
    col.border_inactive = rgba(313244ff) 

    groupbar {
        enabled = true
        font_size = 10
        # Gradients look nice with gray to give it a "brushed metal" feel
        gradients = true
        render_titles = true
        
        # Active tab: Matches the active border
        col.active = rgba(949494ff) 
        # Inactive tab: Matches the inactive border
        col.inactive = rgba(313244ff)
        
        # Text color (white for contrast)
        text_color = rgba(ffffffff)
    }
}
